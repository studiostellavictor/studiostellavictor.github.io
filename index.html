<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Stella Victor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #faf0e6;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      animation: fade-in 0.3s ease;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    body.fade-out {
      opacity: 0;
    }

    .hero {
      text-align: center;
      color: #e00;
    }

    .studio {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
    }

    .name {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .name a {
      color: inherit;
      text-decoration: none;
    }

    .name span {
      transition: opacity 0.2s;
    }

    .name span:hover {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="hero">
    <p class="studio">Studio</p>
    <h1 class="name"><a href="portfolio.html"><span>S</span><span>t</span><span>e</span><span>l</span><span>l</span><span>a</span><br><span>V</span><span>i</span><span>c</span><span>t</span><span>o</span><span>r</span></a></h1>
  </div>
  <script>
    document.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function (e) {
        var href = this.href;
        if (href && href.indexOf(location.origin) === 0) {
          e.preventDefault();
          document.body.classList.add('fade-out');
          setTimeout(function () { window.location = href; }, 300);
        }
      });
    });
  </script>
</body>
</html>
