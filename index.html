<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Stella Victor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .hero {
      text-align: center;
      color: #e00;
    }

    .studio {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
    }

    .name {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="hero">
    <p class="studio">Studio</p>
    <h1 class="name">Stella Victor</h1>
  </div>
</body>
</html>
